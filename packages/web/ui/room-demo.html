<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Room Movement Demo</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1012;
      --panel: #121a1f;
      --panel-2: #182229;
      --line: #2c3b44;
      --text: #d8f7e7;
      --muted: #7fa094;
      --accent: #49e68a;
      --warn: #ffb84d;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      background:
        radial-gradient(circle at 20% 10%, rgba(73, 230, 138, 0.09), transparent 28rem),
        linear-gradient(180deg, #0a0e10 0%, var(--bg) 100%);
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .shell {
      width: min(1180px, calc(100vw - 32px));
      display: grid;
      gap: 12px;
    }

    .topbar {
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: color-mix(in srgb, var(--panel) 88%, transparent);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.28);
    }

    .brand {
      display: flex;
      align-items: baseline;
      gap: 10px;
      white-space: nowrap;
    }

    .brand strong {
      color: var(--accent);
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .brand span {
      color: var(--muted);
      font-size: 12px;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    select,
    input[type="range"] {
      accent-color: var(--accent);
    }

    select {
      min-width: 148px;
      appearance: none;
      color: var(--text);
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 6px 26px 6px 9px;
      font: inherit;
      font-size: 12px;
      background-image:
        linear-gradient(45deg, transparent 50%, var(--accent) 50%),
        linear-gradient(135deg, var(--accent) 50%, transparent 50%);
      background-position:
        calc(100% - 14px) 50%,
        calc(100% - 9px) 50%;
      background-size: 5px 5px, 5px 5px;
      background-repeat: no-repeat;
    }

    input[type="range"] {
      width: 104px;
    }

    .stage-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      max-height: calc(100vh - 104px);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #050708;
      box-shadow:
        0 24px 60px rgba(0, 0, 0, 0.45),
        inset 0 0 0 1px rgba(255, 255, 255, 0.04);
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      image-rendering: pixelated;
      cursor: crosshair;
    }

    .status {
      position: absolute;
      left: 10px;
      bottom: 10px;
      min-width: 176px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #c7ffe0;
      background: rgba(10, 15, 18, 0.78);
      border: 1px solid rgba(73, 230, 138, 0.32);
      border-radius: 6px;
      padding: 7px 9px;
      font-size: 12px;
      pointer-events: none;
      backdrop-filter: blur(5px);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent);
    }

    @media (max-width: 760px) {
      body {
        overflow: auto;
        padding: 12px 0;
      }

      .shell {
        width: min(100vw - 20px, 680px);
      }

      .topbar {
        align-items: stretch;
        flex-direction: column;
      }

      .controls {
        justify-content: flex-start;
      }

      select {
        min-width: 138px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand">
        <strong>MEOWMINE ROOM</strong>
        <span id="assetState">loading assets</span>
      </div>
      <div class="controls">
        <label>
          房间
          <select id="roomSelect" aria-label="room">
            <option value="alley">城中村出租屋</option>
            <option value="university">大学机房</option>
            <option value="warehouse">废弃仓库</option>
            <option value="basement">地下矿场</option>
            <option value="seacontainer">海运集装箱</option>
            <option value="arctic">北极科考站</option>
            <option value="nuclear">废弃核电站</option>
            <option value="orbit">近地轨道舱段</option>
          </select>
        </label>
        <label>
          角色
          <select id="characterSelect" aria-label="character">
            <option value="player">player</option>
          </select>
        </label>
        <label>
          速度
          <input id="speedRange" aria-label="speed" type="range" min="70" max="220" value="132">
        </label>
        <label>
          缩放
          <input id="scaleRange" aria-label="scale" type="range" min="70" max="150" value="94">
        </label>
      </div>
    </header>

    <section class="stage-wrap">
      <canvas id="stage" width="512" height="288"></canvas>
      <div class="status">
        <span class="dot"></span>
        <span id="statusText">ready</span>
      </div>
    </section>
  </main>

  <script>
    const canvas = document.querySelector("#stage");
    const ctx = canvas.getContext("2d");
    const roomSelect = document.querySelector("#roomSelect");
    const speedRange = document.querySelector("#speedRange");
    const scaleRange = document.querySelector("#scaleRange");
    const statusText = document.querySelector("#statusText");
    const assetState = document.querySelector("#assetState");

    ctx.imageSmoothingEnabled = false;

    const STAGE = { width: 512, height: 288 };
    const DIRECTIONS = ["down", "left", "right", "up"];
    const FRAME_COUNT = 4;
    const ROOM_ROOT = "../assets/2d/backgrounds/rooms";
    const CHARACTER_ROOT = "../assets/2d/spritesheet/characters";

    const rooms = {
      alley: "城中村出租屋",
      university: "大学机房",
      warehouse: "废弃仓库",
      basement: "地下矿场",
      seacontainer: "海运集装箱",
      arctic: "北极科考站",
      nuclear: "废弃核电站",
      orbit: "近地轨道舱段",
    };

    const keys = new Set();
    const pointer = { active: false, x: 256, y: 208 };
    const actor = {
      character: "player",
      x: 148,
      y: 214,
      direction: "down",
      moving: false,
      frame: 0,
      frameClock: 0,
      speed: Number(speedRange.value),
      scale: Number(scaleRange.value) / 100,
    };

    const images = {
      rooms: new Map(),
      sprites: new Map(),
    };

    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => reject(new Error(`failed to load ${src}`));
        img.src = src;
      });
    }

    async function loadRoom(id) {
      if (images.rooms.has(id)) return images.rooms.get(id);
      const img = await loadImage(`${ROOM_ROOT}/${id}/background.png`);
      images.rooms.set(id, img);
      return img;
    }

    async function loadSprite(character, mode, direction, frame) {
      const key = `${character}:${mode}:${direction}:${frame}`;
      if (images.sprites.has(key)) return images.sprites.get(key);
      const img = await loadImage(`${CHARACTER_ROOT}/${character}/${mode}/${direction}-${frame}.png`);
      images.sprites.set(key, img);
      return img;
    }

    async function preload() {
      assetState.textContent = "loading room";
      await loadRoom(roomSelect.value);

      assetState.textContent = "loading sprites";
      const tasks = [];
      for (const mode of ["idle", "walk"]) {
        for (const direction of DIRECTIONS) {
          for (let frame = 1; frame <= FRAME_COUNT; frame += 1) {
            tasks.push(loadSprite(actor.character, mode, direction, frame));
          }
        }
      }
      await Promise.all(tasks);
      assetState.textContent = "assets ready";
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function movementVector() {
      let dx = 0;
      let dy = 0;

      if (keys.has("ArrowLeft") || keys.has("a")) dx -= 1;
      if (keys.has("ArrowRight") || keys.has("d")) dx += 1;
      if (keys.has("ArrowUp") || keys.has("w")) dy -= 1;
      if (keys.has("ArrowDown") || keys.has("s")) dy += 1;

      if (pointer.active) {
        const toX = pointer.x - actor.x;
        const toY = pointer.y - actor.y;
        const distance = Math.hypot(toX, toY);
        if (distance > 4) {
          dx += toX / distance;
          dy += toY / distance;
        } else {
          pointer.active = false;
        }
      }

      const length = Math.hypot(dx, dy);
      if (length > 0) {
        dx /= length;
        dy /= length;
      }
      return { dx, dy };
    }

    function setDirection(dx, dy) {
      if (Math.abs(dx) > Math.abs(dy)) {
        actor.direction = dx < 0 ? "left" : "right";
      } else if (Math.abs(dy) > 0.01) {
        actor.direction = dy < 0 ? "up" : "down";
      }
    }

    function update(dt) {
      actor.speed = Number(speedRange.value);
      actor.scale = Number(scaleRange.value) / 100;

      const { dx, dy } = movementVector();
      actor.moving = Math.abs(dx) + Math.abs(dy) > 0;

      if (actor.moving) {
        setDirection(dx, dy);
        actor.x += dx * actor.speed * dt;
        actor.y += dy * actor.speed * dt;
      }

      const spriteHalfW = 28 * actor.scale;
      actor.x = clamp(actor.x, 28 + spriteHalfW, STAGE.width - 28 - spriteHalfW);
      actor.y = clamp(actor.y, 126, 252);

      const frameDuration = actor.moving ? 0.12 : 0.24;
      actor.frameClock += dt;
      if (actor.frameClock >= frameDuration) {
        actor.frameClock = 0;
        actor.frame = (actor.frame + 1) % FRAME_COUNT;
      }

      statusText.textContent = `${rooms[roomSelect.value]} · ${actor.direction} · ${Math.round(actor.x)},${Math.round(actor.y)}`;
    }

    function drawFloorShadow(x, y, scale) {
      ctx.save();
      ctx.globalAlpha = 0.38;
      ctx.fillStyle = "#030607";
      ctx.beginPath();
      ctx.ellipse(x, y + 7 * scale, 18 * scale, 6 * scale, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function draw() {
      ctx.clearRect(0, 0, STAGE.width, STAGE.height);
      ctx.imageSmoothingEnabled = false;

      const room = images.rooms.get(roomSelect.value);
      if (room) {
        ctx.drawImage(room, 0, 0, STAGE.width, STAGE.height);
      } else {
        ctx.fillStyle = "#0b1012";
        ctx.fillRect(0, 0, STAGE.width, STAGE.height);
      }

      if (pointer.active) {
        ctx.save();
        ctx.strokeStyle = "rgba(73, 230, 138, 0.7)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(pointer.x, pointer.y, 5, 0, Math.PI * 2);
        ctx.moveTo(pointer.x - 8, pointer.y);
        ctx.lineTo(pointer.x + 8, pointer.y);
        ctx.moveTo(pointer.x, pointer.y - 8);
        ctx.lineTo(pointer.x, pointer.y + 8);
        ctx.stroke();
        ctx.restore();
      }

      const mode = actor.moving ? "walk" : "idle";
      const sprite = images.sprites.get(`${actor.character}:${mode}:${actor.direction}:${actor.frame + 1}`);
      if (sprite) {
        const w = sprite.width * actor.scale;
        const h = sprite.height * actor.scale;
        drawFloorShadow(actor.x, actor.y, actor.scale);
        ctx.drawImage(sprite, Math.round(actor.x - w / 2), Math.round(actor.y - h), Math.round(w), Math.round(h));
      }
    }

    let previousTime = performance.now();
    function loop(now) {
      const dt = Math.min(0.05, (now - previousTime) / 1000);
      previousTime = now;
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }

    function canvasPoint(event) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: ((event.clientX - rect.left) / rect.width) * STAGE.width,
        y: ((event.clientY - rect.top) / rect.height) * STAGE.height,
      };
    }

    window.addEventListener("keydown", (event) => {
      const key = event.key.length === 1 ? event.key.toLowerCase() : event.key;
      if (["ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown", "w", "a", "s", "d"].includes(key)) {
        event.preventDefault();
        pointer.active = false;
        keys.add(key);
      }
    });

    window.addEventListener("keyup", (event) => {
      const key = event.key.length === 1 ? event.key.toLowerCase() : event.key;
      keys.delete(key);
    });

    canvas.addEventListener("pointerdown", (event) => {
      const p = canvasPoint(event);
      pointer.x = clamp(p.x, 34, STAGE.width - 34);
      pointer.y = clamp(p.y, 126, 252);
      pointer.active = true;
      canvas.setPointerCapture(event.pointerId);
    });

    canvas.addEventListener("pointermove", (event) => {
      if (!pointer.active || event.buttons === 0) return;
      const p = canvasPoint(event);
      pointer.x = clamp(p.x, 34, STAGE.width - 34);
      pointer.y = clamp(p.y, 126, 252);
    });

    roomSelect.addEventListener("change", async () => {
      assetState.textContent = "loading room";
      await loadRoom(roomSelect.value);
      assetState.textContent = "assets ready";
    });

    preload()
      .then(() => {
        previousTime = performance.now();
        requestAnimationFrame(loop);
      })
      .catch((error) => {
        assetState.textContent = "asset error";
        statusText.textContent = error.message;
        console.error(error);
      });
  </script>
</body>
</html>
