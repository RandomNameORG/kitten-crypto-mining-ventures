name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed so gh release --generate-notes can diff against previous tag

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Download modules
        run: go mod download

      - name: Vet + test sanity check
        run: |
          go vet ./...
          go test -count=1 ./...

      - name: Cross-compile 8 binaries
        run: |
          mkdir -p bin
          for target in "windows amd64 .exe" "linux amd64 " "darwin amd64 " "darwin arm64 "; do
            set -- $target
            os=$1; arch=$2; ext=$3
            for cmd in meowmine meowmine-ssh; do
              echo "building $cmd-$os-$arch$ext"
              GOOS=$os GOARCH=$arch go build -ldflags "-s -w" \
                -o "bin/$cmd-$os-$arch$ext" "./cmd/$cmd"
            done
          done
          ls -lh bin/

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            bin/*

      - name: Bump Homebrew formula on main
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          ruby scripts/update-formula.rb "$VERSION"
          if git diff --quiet Formula/meowmine.rb; then
            echo "Formula already up to date"
            exit 0
          fi
          git add Formula/meowmine.rb
          git commit -m "chore: bump formula to $VERSION"
          git push origin main
