<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <title>矿业大亨喵 2D</title>
  <link rel="stylesheet" href="/ui2d/play.css">
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="catmark">M</div>
        <div>
          <h1>矿业大亨喵</h1>
          <div class="subtitle" id="subtitle">2D Pixel Tycoon</div>
        </div>
      </div>
      <section class="hud" id="hud"></section>
    </header>

    <section class="layout">
      <section class="stage-shell">
        <div class="stage-head">
          <div class="room-title">
            <strong id="roomName">loading</strong>
            <span id="roomFlavor">loading</span>
          </div>
          <div class="stage-actions">
            <button id="pauseButton" type="button">暂停</button>
            <button id="ventButton" type="button">排热</button>
            <button id="resetButton" type="button">重开</button>
          </div>
        </div>
        <div class="canvas-wrap">
          <canvas id="stage" width="512" height="288" aria-label="2D game stage"></canvas>
          <div class="toast" id="toast">connecting</div>
        </div>
        <div class="stage-foot" id="stageFoot"></div>
      </section>

      <aside class="side">
        <nav class="tabs" id="tabs"></nav>
        <section class="panel" id="panel"></section>
      </aside>
    </section>
  </main>

  <script src="/ui2d/play.js"></script>
</body>
</html>
